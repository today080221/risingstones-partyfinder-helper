name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  portable-windows:
    name: Build Windows portable package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable package
        env:
          RISINGSTONES_UPDATE_GITEE_REPO: ${{ secrets.RISINGSTONES_UPDATE_GITEE_REPO }}
        run: npm run release:check

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            release/*.zip
            release/*.sha256

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = Get-ChildItem -Path release -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No release zip found."
          }
          $checksum = Get-ChildItem -Path release -Filter *.sha256 | Select-Object -First 1
          $assets = @($zip.FullName)
          if ($checksum) {
            $assets += $checksum.FullName
          }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title $tag --notes-file CHANGELOG.md
          }
