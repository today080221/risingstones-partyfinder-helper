name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  portable-windows:
    name: Build Windows portable package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc --profile default
          rustup default stable-x86_64-pc-windows-msvc

      - name: Build Node portable package
        env:
          RISINGSTONES_UPDATE_GITEE_REPO: ${{ secrets.RISINGSTONES_UPDATE_GITEE_REPO }}
        run: npm run release:check

      - name: Build Tauri desktop portable package
        run: npm run package:desktop:portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            release/*.zip
            release/*.sha256

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = Get-ChildItem -Path "release/*.zip", "release/*.sha256" -File | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
            throw "No release assets found."
          }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title $tag --notes-file CHANGELOG.md
          }
