name: 功能建议
description: 提出新功能或体验改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能要改善什么使用场景？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望它大概怎么工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 有没有你考虑过但不喜欢的方案？
  - type: textarea
    id: safety
    attributes:
      label: 安全边界
      description: 如果功能涉及账号、官方页面或自动化请求，请说明需要哪些限制。
